name: test
# Auto-managed by ~/.local/bin/gh-harden-repos.sh. Do not hand-edit.
# Smoke-test workflow for Python repos without tests/. Verifies pyproject
# parses cleanly and the package installs. When the repo grows tests/,
# this auto-managed file is replaced by render_minimal_ci_workflow().
on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
permissions:
  contents: read
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Validate pyproject + install
        run: |
          python -m pip install --upgrade pip build
          python -m pip install -e . || python -m pip install .
      - name: Build sdist + wheel (validates pyproject metadata)
        run: python -m build --sdist --wheel